pre-commit:
  parallel: true
  commands:
    biome-check:
      glob: "*.{js,ts,jsx,tsx,json,css}"
      run: bunx biome check --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
    typecheck:
      run: bunx tsc --noEmit

commit-msg:
  commands:
    commitlint:
      run: bunx commitlint --edit {1}

pre-push:
  parallel: true
  commands:
    biome-check:
      run: bunx biome check .
    typecheck:
      run: bunx tsc --noEmit
    # NOTE: Remove the build check below if push latency becomes
    # annoying as the project grows. CI will catch build failures.
    build:
      run: bun run build
